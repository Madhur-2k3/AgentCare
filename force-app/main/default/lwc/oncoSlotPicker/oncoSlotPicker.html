<template>
    <div class="container">
        <template lwc:if={showContent}>
            <!-- Doctor Header -->
            <template lwc:if={hasDoctorName}>
                <div class="doctor-header">
                    <div class="doctor-avatar">
                        <lightning-icon icon-name="standard:individual" size="small"></lightning-icon>
                    </div>
                    <div class="doctor-info">
                        <span class="doctor-name">{doctorName}</span>
                        <span class="doctor-type">{workTypeName} • {durationMinutes} min</span>
                    </div>
                </div>
            </template>

            <!-- Date Carousel -->
            <div class="date-carousel">
                <div class="date-nav">
                    <button class={prevBtnClass} onclick={handlePrevDate}>
                        <lightning-icon icon-name="utility:chevronleft" size="xx-small"></lightning-icon>
                    </button>
                    <div class="date-chips">
                        <template for:each={calendarDates} for:item="d">
                            <div
                                key={d.key}
                                class={d.chipClass}
                                data-index={d.index}
                                onclick={handleDateClick}
                                role="button"
                                tabindex="0"
                            >
                                <span class="chip-day">{d.dayName}</span>
                                <span class="chip-num">{d.dayNum}</span>
                            </div>
                        </template>
                    </div>
                    <button class={nextBtnClass} onclick={handleNextDate}>
                        <lightning-icon icon-name="utility:chevronright" size="xx-small"></lightning-icon>
                    </button>
                </div>
            </div>

            <!-- Loading State -->
            <template lwc:if={isLoading}>
                <div class="loading-state">
                    <lightning-spinner alternative-text="Loading slots" size="small"></lightning-spinner>
                    <span class="loading-text">Loading slots...</span>
                </div>
            </template>

            <!-- Slots Content -->
            <template lwc:if={hasSlots}>
                <template lwc:if={hasSlotGroups}>
                    <template for:each={slotGroups} for:item="group">
                        <div key={group.key} class="slot-group">
                            <div class="group-label">
                                <span class="group-icon">{group.icon}</span>
                                <span>{group.period}</span>
                            </div>
                            <div class="slot-grid">
                                <template for:each={group.slots} for:item="slot">
                                    <div
                                        key={slot.key}
                                        class={slot.pillClass}
                                        data-key={slot.key}
                                        data-start={slot.startTime}
                                        data-end={slot.endTime}
                                        data-date={slot.date}
                                        data-iso={slot.isoStart}
                                        onclick={handleSlotClick}
                                        role="button"
                                        tabindex="0"
                                    >
                                        <lightning-icon icon-name="utility:clock" size="xx-small" class="pill-icon"></lightning-icon>
                                        <span class="pill-time">{slot.startTime}</span>
                                        <template lwc:if={slot.isSelected}>
                                            <lightning-icon icon-name="utility:check" size="xx-small" class="pill-check" variant="inverse"></lightning-icon>
                                        </template>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </template>

                <!-- Prep Instructions -->
                <template lwc:if={hasPrepInstructions}>
                    <div class="prep-banner">
                        <lightning-icon icon-name="utility:info_alt" size="xx-small" class="prep-icon"></lightning-icon>
                        <span>{prepInstructions}</span>
                    </div>
                </template>

                <!-- Tap Hint -->
                <div class="select-prompt">
                    <lightning-icon icon-name="utility:touch_action" size="xx-small" class="prompt-icon"></lightning-icon>
                    <span>Tap a time slot to book</span>
                </div>
            </template>

            <!-- No Slots / Info Message -->
            <template lwc:elseif={hasDateInfoMessage}>
                <div class="info-state">
                    <lightning-icon icon-name="utility:info" size="small"></lightning-icon>
                    <span>{dateInfoMessage}</span>
                </div>
            </template>

            <!-- Empty + not loading -->
            <template lwc:elseif={isLoading}>
                <!-- handled above -->
            </template>
        </template>

        <!-- Completely empty -->
        <template lwc:else>
            <div class="empty-state">
                <lightning-icon icon-name="utility:info" size="small"></lightning-icon>
                <span>No slot information available.</span>
            </div>
        </template>
    </div>
</template>
