<template>
    <div class="container">
        <template lwc:if={hasFacilities}>
            <div class="header">
                <lightning-icon icon-name="standard:location" size="small"></lightning-icon>
                <span class="header-text">
                    {totalFacilities} Facilities Found
                </span>
            </div>

            <div class="select-prompt">
                <lightning-icon icon-name="utility:touch_action" size="xx-small" class="prompt-icon"></lightning-icon>
                <span>Tap a facility to select it</span>
            </div>

            <div class="facility-list">
                <template for:each={facilities} for:item="facility">
                    <div
                        key={facility.territoryId}
                        class={facility.cardClass}
                        data-territoryid={facility.territoryId}
                        data-name={facility.name}
                        onclick={handleFacilityClick}
                        role="button"
                        tabindex="0"
                    >
                        <div class="facility-name">
                            <lightning-icon icon-name="custom:custom94" size="x-small" class="hospital-icon"></lightning-icon>
                            <span class="facility-name-text">{facility.name}</span>
                            <template lwc:if={facility.isSelected}>
                                <lightning-icon icon-name="utility:check" size="xx-small" class="check-icon" variant="success"></lightning-icon>
                            </template>
                        </div>
                        <div class="facility-detail">
                            <lightning-icon icon-name="utility:location" size="xx-small" class="detail-icon"></lightning-icon>
                            <span>{facility.address}</span>
                        </div>
                        <div class="facility-detail">
                            <lightning-icon icon-name="utility:clock" size="xx-small" class="detail-icon"></lightning-icon>
                            <span>{facility.hours}</span>
                        </div>
                    </div>
                </template>
            </div>
        </template>

        <template lwc:else>
            <div class="empty-state">
                <lightning-icon icon-name="utility:info" size="small"></lightning-icon>
                <span>No facilities found for the requested city.</span>
            </div>
        </template>
    </div>
</template>
